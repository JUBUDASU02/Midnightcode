# ─────────────────────────────────────────────────────────────────────────────
# docker-compose RAÍZ — orquesta Frontend + Backend + Base de datos
# Ejecutar desde: C:\Users\JUBUDASU02\OneDrive\Escritorio\MidNightCode\
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Base de datos MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: midnight_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - midnight_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      retries: 10
      timeout: 5s

  # ─── PhpMyAdmin (interfaz visual de la DB) ────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: midnight_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - midnight_network

  # ─── Backend Express ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/midnightcode
      dockerfile: Dockerfile
    container_name: midnight_backend
    restart: unless-stopped
    env_file:
      - ./backend/midnightcode/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - midnight_network

  # ─── Frontend React + Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Lee la URL de la API desde el .env del frontend
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: midnight_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - midnight_network

volumes:
  dbdata:

networks:
  midnight_network:
    driver: bridge
