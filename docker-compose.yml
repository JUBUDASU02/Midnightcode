# docker-compose.yml
version: "3.9"

services:

  frontend:
    container_name: neon_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - neon_network
    restart: unless-stopped

  backend:
    container_name: neon_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - neon_network
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}

networks:
  neon_network:
    driver: bridge
