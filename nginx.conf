# nginx.conf
# Configuración para servir una SPA de React con React Router
# y hacer proxy de las llamadas al backend Express

server {
    listen 80;
    server_name localhost;

    # Carpeta raíz donde están los archivos del build de Vite
    root /usr/share/nginx/html;
    index index.html;

    # ─── Compresión gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1000;

    # ─── Cache de assets estáticos ─────────────────────────────────────────
    # Vite genera nombres con hash (ej: main-abc123.js) — cacheable para siempre
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Proxy al backend Express ──────────────────────────────────────────
    # Todas las llamadas a /api/* se redirigen al backend
    # Esto evita problemas de CORS en producción
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── SPA fallback ──────────────────────────────────────────────────────
    # CRÍTICO para React Router: cualquier ruta que no sea un archivo
    # real devuelve index.html y React maneja la navegación del lado cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Seguridad básica ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Ocultar versión de Nginx
    server_tokens off;
}
