server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Seguridad: headers HTTP ──────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # CSP básico — ajustar según tus fuentes (fonts, APIs, etc.)
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';"
        always;

    # ─── Compresión Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Endpoint de health check (para Docker HEALTHCHECK) ──────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Assets con cache agresivo ────────────────────────────────────────────
    # Vite genera nombres con hash (main.a1b2c3.js), seguros para cachear 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── SPA Routing ──────────────────────────────────────────────────────────
    # Todas las rutas que no sean archivos reales → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Ocultar versión de Nginx ─────────────────────────────────────────────
    server_tokens off;

    # ─── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}